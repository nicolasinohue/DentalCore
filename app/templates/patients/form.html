{% extends 'base.html' %}

{% block title %}{{ title }} | DentalCore{% endblock %}

{% block content %}
<section class="form-card">
    <h1>{{ title }}</h1>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <label>Nome completo {{ form.full_name }} {{ form.full_name.errors }}</label>
        <label>CPF {{ form.cpf }} {{ form.cpf.errors }}</label>
        <label>Telefone {{ form.phone }} {{ form.phone.errors }}</label>
        <label>Data de nascimento {{ form.birth_date }} {{ form.birth_date.errors }}</label>
        <label>Observacoes {{ form.notes }} {{ form.notes.errors }}</label>

        <div class="form-actions">
            <button type="submit" class="btn">Salvar</button>
            <a class="btn btn-light" href="{% url 'patients_list' %}">Cancelar</a>
        </div>
    </form>
</section>
{% endblock %}
